# Starter-Konfiguration fuer bes3-ble-cockpit -- welche Signale wie
# angezeigt werden. `signal` ist ein Schluessel aus decode_bes3.SIGNALS
# (siehe dort bzw. die Haupt-README fuer die vollstaendige Signalliste und
# die Herleitung jeder Skala).
#
# Pro Eintrag:
#   signal:  Schluessel aus decode_bes3.SIGNALS (Pflicht ausser bei
#            clock_text/clock_analog -- die zeigen die Systemuhrzeit statt
#            eines BLE-Signals)
#   label:   Anzeigename (optional). Ohne Angabe wird KEIN Titel gezeigt --
#            kein automatischer Fallback auf den rohen Signalnamen.
#   type:    gauge        (Zeiger-Anzeige im Vollkreis-Stil, braucht min/max) |
#            vu_meter     (Zeiger-Anzeige im Stil einer analogen
#                          Aussteuerungsanzeige -- flacherer Bogen statt
#                          Vollkreis, braucht ebenfalls min/max) |
#            led_bar      (vertikaler LED-Balken/Peak-Meter -- diskrete
#                          Segmente statt Nadel, braucht min/max, optional
#                          segments fuer die Segmentanzahl, Standard 20) |
#            ring_gauge   (mehrere konzentrische Fortschrittsringe -- NUR fuer
#                          reichweite_km_je_modus, das einen 4er-Wert statt
#                          eines Skalars liefert: ein Ring je Fahrmodus
#                          ECO/TOUR+/eMTB/TURBO) |
#            number       (grosse Zahl) |
#            badge        (Text -- fuer kategoriale Werte wie fahrmodus) |
#            clock_text   (aktuelle Uhrzeit als Text, kein signal noetig, kein
#                          Titel-Label -- eine Uhr erklaert sich selbst) |
#            clock_analog (aktuelle Uhrzeit als analoge Uhr, kein signal
#                          noetig, ebenfalls kein Titel-Label)
#   unit:    Einheit fuer die Anzeige (optional, z. B. "km/h")
#   min/max: Wertebereich (nur type: gauge/vu_meter/led_bar/ring_gauge)
#   thresholds: Farbzonen-Grenzen (nur type: gauge/vu_meter/led_bar, optional),
#            z. B. [20, 50] -> rot bis 20, gelb bis 50, gruen darueber
#            (absolute Werte, nicht Anteile)
#   invert_colors: dreht die Farbreihenfolge um (gruen -> gelb -> rot statt
#            rot -> gelb -> gruen), fuer Signale bei denen ein HOHER Wert
#            schlecht ist (z. B. Temperaturen) statt ein niedriger (wie beim
#            Akku). Nur type: gauge/vu_meter/led_bar, optional, Standard false.
#   segments: Segmentanzahl (nur type: led_bar, optional, Standard 20)
#
# Aktualisierung der BLE-Signale ist rein ereignisgetrieben: sobald
# bes3-ble-cockpit.py eine Notification fuer ein hier gelistetes Signal
# dekodiert, wird genau diese Kachel sofort aktualisiert -- kein
# Zeitintervall, kein Polling. Die Uhrzeit-Kacheln (clock_text/clock_analog)
# sind die einzige Ausnahme -- die aktualisieren sich einmal pro Sekunde
# ueber die Systemuhr, unabhaengig vom Bike.
#
# Die Wertebereiche unten sind sinnvolle Startwerte, orientiert an den
# beobachteten Werten aus echten Aufnahmen sowie den bekannten technischen
# Daten der Bosch Performance Line CX (siehe Haupt-README, Bauteil-Typcode
# BDU3740) -- gerne an das eigene Bike/die eigene Fahrweise anpassen.

# Globale Darstellungs-Einstellungen (optional, alle koennen weggelassen
# werden -- dann Browser-/NiceGUI-Standard):
#   background_color:      Seiten-Hintergrundfarbe (z. B. fuer ein dunkles
#                           Cockpit bei Nacht). Aktiviert automatisch
#                           ui.dark_mode(), damit Textfarben stimmig
#                           mitwechseln -- gedacht fuer einen dunklen Wert.
#   tile_background_color: Hintergrundfarbe der einzelnen Kacheln
#   text_color:             Textfarbe der Werte/Badges/Legenden bei den
#                           HTML-Anzeigen (number/badge/led_bar-Label/
#                           Ring-Legende). Wirkt NICHT auf gauge/vu_meter --
#                           die zeichnen Skala/Titel/Wert selbst als Grafik,
#                           dafuer separat: gauge_text_color.
#   gauge_text_color:       Text-/Skalenfarbe INNERHALB der gauge/vu_meter-
#                           Charts (Skalenzahlen, Titel, Wertanzeige) -- vom
#                           umgebenden text_color unabhaengig, weil ECharts
#                           seinen Text selbst zeichnet und keine CSS-Farbe
#                           erbt.
#   scale:                  Skalierung der gesamten Seite (1.0 = 100 %, z. B.
#                           1.5 fuer ein kleines/weit entferntes Display am
#                           Lenker, 0.8 fuer mehr Kacheln auf einen Blick)
display:
  background_color: "#121212"
  tile_background_color: "#2a2a2a"
  text_color: "#f0f0f0"
  gauge_text_color: "#f0f0f0"
  scale: 1.0

gauges:
  - signal: geschwindigkeit_kmh
    label: "Geschwindigkeit"
    unit: "km/h"
    type: gauge
    min: 0
    max: 50

  - signal: fahrer_leistung_w
    label: "Fahrerleistung"
    unit: "W"
    type: gauge
    min: 0
    max: 500

  - signal: motor_leistung_w
    label: "Motorleistung"
    unit: "W"
    type: gauge
    min: 0
    max: 600

  - signal: trittfrequenz_rpm
    label: "Trittfrequenz"
    unit: "U/min"
    type: gauge
    min: 0
    max: 200
    # Hinweis: manche BLE-Auswertungen berichten hier einen Faktor-2-
    # Unterschied zur tatsaechlichen Trittfrequenz (offene Frage, siehe
    # BLE-Abschnitt der bes3-decoder-README) -- Range bewusst grosszuegig
    # gewaehlt, bis das geklaert ist.

  - signal: fet_temperatur_c
    label: "FET-Temp."
    unit: "°C"
    type: gauge
    min: 0
    max: 100
    thresholds: [50, 75]
    invert_colors: true  # niedrig = gut (gruen), hoch = schlecht (rot)

  - signal: pcb_temperatur_c
    label: "PCB-Temp."
    unit: "°C"
    type: gauge
    min: 0
    max: 80
    thresholds: [45, 65]
    invert_colors: true

  - signal: ladezustand_prozent
    label: "Akku"
    unit: "%"
    type: led_bar
    min: 0
    max: 100
    thresholds: [20, 50]

  - signal: hoehe_smartphone_m
    unit: "m"
    type: number
    # Kein label -- braucht keinen Titel. Hinweis: stammt laut
    # decode_bes3.py vermutlich vom gekoppelten Smartphone, nicht von einem
    # Sensor der Antriebseinheit -- die beobachteten Werte passten in Tests
    # nicht zur tatsaechlichen Hoehe der Strecke (Ursache ungeklaert). Als
    # Text/Zahl statt Gauge, weil kein sinnvoller fester Wertebereich
    # existiert.

  - signal: fahrmodus
    type: badge  # kein label -- braucht keinen Titel

  - signal: reichweite_km_je_modus
    type: ring_gauge  # kein label -- braucht keinen Titel
    max: 150

  - type: clock_text

  - type: clock_analog
